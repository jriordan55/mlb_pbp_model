# Ping the live Render web service so the free tier does not sleep.
name: Keep live API awake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Health check
        env:
          LIVE_API_BASE: ${{ secrets.LIVE_API_BASE }}
        run: |
          if [ -z "${LIVE_API_BASE:-}" ]; then
            echo "Set LIVE_API_BASE secret to your Render URL (e.g. https://mlb-pbp-web.onrender.com)"
            exit 0
          fi
          curl -fsS --retry 3 --retry-delay 5 --max-time 45 "${LIVE_API_BASE%/}/api/health"
          echo
